# .github/workflows/sector_rotation.yml
name: Sector Rotation Bot

on:
  schedule:
    # Lunes a viernes, 30 min después del cierre de NYSE (datos completos)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:  # Ejecución manual

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Cache sector data (persiste entre runs)
        uses: actions/cache@v3
        with:
          path: .sector_cache.json
          key: sector-cache-${{ github.run_id }}
          restore-keys: |
            sector-cache-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests
      
      - name: Run sector rotation bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: ${{ vars.DEBUG }}
        run: python telegram_bot.py
