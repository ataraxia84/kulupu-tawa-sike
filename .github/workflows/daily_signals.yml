name: Enviar señales diarias de rotación sectorial

on:
  schedule:
    # Ejecutar todos los días a las 20:00 UTC (16:00 ET, después del cierre)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  send-signals:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt
    
    - name: Ejecutar bot de Telegram
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python telegram_bot.py
    
    - name: Subir caché como artefacto
      uses: actions/upload-artifact@v3
      with:
        name: score-cache
        path: .score_cache.json
        retention-days: 7
    
    - name: Guardar caché para próxima ejecución
      uses: actions/cache@v3
      with:
        path: .score_cache.json
        key: score-cache-${{ github.run_id }}
        restore-keys: |
          score-cache-
